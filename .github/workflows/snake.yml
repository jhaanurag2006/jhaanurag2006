name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *"  # runs every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: jhaanurag2006
          outputs: dist/github-contribution-grid-snake-dark.svg

      - name: Configure Git for contributions
        run: |
          git config user.name "Anurag Jha"
          git config user.email "jha.anurag260306@gmail.com"

      - name: Commit and push SVG
        run: |
          git checkout -B output
          git add dist/github-contribution-grid-snake-dark.svg
          git commit -m "Update contribution snake" || echo "No changes to commit"
          git push -u origin output --force
